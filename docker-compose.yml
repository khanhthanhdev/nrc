# Docker Compose for nrc-full
# Full-stack container orchestration

name: nrc-full

services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: nrc-full-web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - VITE_API_URL=http://server:3001
    restart: unless-stopped
    depends_on:
      - server
    networks:
      - nrc-full-network

  server:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    container_name: nrc-full-server
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:password@db:5432/nrc-full
    restart: unless-stopped
    depends_on:
      - db
    networks:
      - nrc-full-network

  db:
    image: postgres:16-alpine
    container_name: nrc-full-postgres
    environment:
      POSTGRES_DB: nrc-full
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - nrc-full_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - nrc-full-network

networks:
  nrc-full-network:
    driver: bridge

volumes:
  nrc-full_postgres_data:
